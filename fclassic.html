<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funky Classic Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  font-family: 'Poppins', sans-serif;
}

.main {
  padding: 30px;
}

/* Form */
.form-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

/* Resume */
.resume-box {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  min-height: 1100px;
}

/* HEADER (FUNKY PART) */
.header {
  background: linear-gradient(120deg, #76b4d5, #3b82f6);
  color: white;
  text-align: center;
  padding: 30px 20px;
}

.profile-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid white;
  object-fit: cover;
  margin-bottom: 10px;
}

.header h2 {
  margin: 5px 0;
}

.header p {
  font-size: 14px;
  opacity: 0.9;
}

/* Content */
.content {
  padding: 25px;
}

/* Sections with COLORS */
.section {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.section:nth-child(1) { background: #fdf2f8; }
.section:nth-child(2) { background: #eff6ff; }
.section:nth-child(3) { background: #ecfdf5; }
.section:nth-child(4) { background: #fff7ed; }
.section:nth-child(5) { background: #f0f9ff; }
.section:nth-child(6) { background: #fef9c3; }
.section:nth-child(7) { background: #ede9fe; }
.section:nth-child(8) { background: #ffe4e6; }

.section h5 {
  font-weight: 600;
  margin-bottom: 8px;
}

/* List */
.section ul {
  padding-left: 18px;
}

.section li {
  font-size: 14px;
  margin-bottom: 5px;
}

/* Button */
.btn-download {
  margin-top: 15px;
  background: linear-gradient(to right, #ec4899, #3b82f6);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 25px;
}

/* Print */
@media print {
  .form-box, .btn-download {
    display: none;
  }
  body {
    background: white;
  }
}
</style>
</head>

<body>

<div class="container main">
<div class="row g-4">

<!-- FORM -->
<div class="col-md-5">
<div class="form-box">

<h4>Enter Details</h4>

<input class="form-control mb-2" placeholder="Full Name" oninput="update()">
<input class="form-control mb-2" placeholder="Email" oninput="update()">
<input class="form-control mb-2" placeholder="Phone" oninput="update()">

<input type="file" class="form-control mb-2" accept="image/*" onchange="loadImage(event)">

<textarea class="form-control mb-2" placeholder="Objective" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Skills (line by line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Education" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Experience" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Projects" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Internships" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Certifications" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Achievements" oninput="update()"></textarea>

<button class="btn-download" onclick="window.print()">Download</button>

</div>
</div>

<!-- RESUME -->
<div class="col-md-7">
<div class="resume-box">

<!-- HEADER -->
<div class="header">
  <img id="profilePic" class="profile-img" src="https://via.placeholder.com/150">
  <h2 id="name">Your Name</h2>
  <p id="contact">email@example.com | 1234567890</p>
</div>

<div class="content">

<div class="section">
<h5>Objective</h5>
<ul id="objective"></ul>
</div>

<div class="section">
<h5>Skills</h5>
<ul id="skills"></ul>
</div>

<div class="section">
<h5>Education</h5>
<ul id="education"></ul>
</div>

<div class="section">
<h5>Experience</h5>
<ul id="experience"></ul>
</div>

<div class="section">
<h5>Projects</h5>
<ul id="projects"></ul>
</div>

<div class="section">
<h5>Internships</h5>
<ul id="internships"></ul>
</div>

<div class="section">
<h5>Certifications</h5>
<ul id="certifications"></ul>
</div>

<div class="section">
<h5>Achievements</h5>
<ul id="achievements"></ul>
</div>

</div>

</div>
</div>

</div>
</div>

<script>
function makeList(id, text) {
  let el = document.getElementById(id);
  el.innerHTML = "";
  text.split("\n").forEach(t => {
    if(t.trim()){
      let li = document.createElement("li");
      li.textContent = t;
      el.appendChild(li);
    }
  });
}

function update() {
  let i = document.querySelectorAll("input, textarea");

  document.getElementById("name").innerText = i[0].value;
  document.getElementById("contact").innerText = i[1].value + " | " + i[2].value;

  makeList("objective", i[4].value);
  makeList("skills", i[5].value);
  makeList("education", i[6].value);
  makeList("experience", i[7].value);
  makeList("projects", i[8].value);
  makeList("internships", i[9].value);
  makeList("certifications", i[10].value);
  makeList("achievements", i[11].value);
}

function loadImage(event) {
  document.getElementById("profilePic").src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
