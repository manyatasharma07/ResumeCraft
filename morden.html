<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Resume - ResumeCraft</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #dbeafe, #f1f5f9); /* soft blue gradient */
}

/* Main spacing */
.main {
  padding: 40px 20px;
}

/* Form Box */
.form-box {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px); /* glass effect */
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  height: 100%;
}

/* Resume Box */
.resume-box {
  background: #ffffff;
  padding: 35px;
  border-radius: 15px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.1);
  width: 100%;
  min-height: 750px;
  border-left: 6px solid #2563eb; /* modern side accent */
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 25px;
}

.header h2 {
  margin-bottom: 5px;
  font-weight: 600;
}

.line {
  height: 3px;
  width: 70px;
  background: linear-gradient(to right, #2563eb, #60a5fa);
  margin: 10px auto;
  border-radius: 5px;
}

/* Sections */
.section {
  margin-top: 20px;
}

.section h5 {
  font-weight: 600;
  color: #2563eb;
  margin-bottom: 6px;
}

/* Button */
.btn-download {
  margin-top: 15px;
  background: linear-gradient(to right, #2563eb, #60a5fa);
  color: white;
  border-radius: 25px;
  padding: 8px 20px;
  border: none;
  transition: 0.3s;
}

.btn-download:hover {
  transform: scale(1.05);
}
  </style>
</head>

<body>

<div class="container main">
  <div class="row g-4 align-items-stretch">

    <!-- FORM -->
    <div class="col-md-5">
      <div class="form-box">

        <h4>Enter Details</h4>

        <input type="text" class="form-control mb-2" placeholder="Full Name" oninput="updateResume()">
        <input type="text" class="form-control mb-2" placeholder="Email" oninput="updateResume()">
        <input type="text" class="form-control mb-2" placeholder="Phone" oninput="updateResume()">

        <textarea class="form-control mb-2" placeholder="Profile / Summary" oninput="updateResume()"></textarea>
        <textarea class="form-control mb-2" placeholder="Skills" oninput="updateResume()"></textarea>
        <textarea class="form-control mb-2" placeholder="Education" oninput="updateResume()"></textarea>
        <textarea class="form-control mb-2" placeholder="Experience" oninput="updateResume()"></textarea>
        <textarea class="form-control mb-2" placeholder="Projects" oninput="updateResume()"></textarea>

        <button class="btn-download" onclick="download()">Download</button>

      </div>
    </div>

    <!-- RESUME -->
    <div class="col-md-7">
      <div class="resume-box" id="resume">

        <!-- Header -->
        <div class="header">
          <h2 id="name">Your Name</h2>
          <p id="contact">Email | Phone</p>
          <div class="line"></div>
        </div>

        <div class="section">
          <h5>Profile</h5>
          <p id="profile">Short profile summary</p>
        </div>

        <div class="section">
          <h5>Skills</h5>
          <p id="skills">Your skills</p>
        </div>

        <div class="section">
          <h5>Education</h5>
          <p id="education">Your education</p>
        </div>

        <div class="section">
          <h5>Experience</h5>
          <p id="experience">Your experience</p>
        </div>

        <div class="section">
          <h5>Projects</h5>
          <p id="projects">Your projects</p>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  function updateResume() {
    let inputs = document.querySelectorAll("input, textarea");

    document.getElementById("name").innerText = inputs[0].value || "Your Name";
    document.getElementById("contact").innerText =
      (inputs[1].value || "Email") + " | " + (inputs[2].value || "Phone");

    document.getElementById("profile").innerText = inputs[3].value || "Profile summary";
    document.getElementById("skills").innerText = inputs[4].value || "Your skills";
    document.getElementById("education").innerText = inputs[5].value || "Your education";
    document.getElementById("experience").innerText = inputs[6].value || "Your experience";
    document.getElementById("projects").innerText = inputs[7].value || "Your projects";
  }

  function download() {
    window.print();
  }
</script>

</body>
</html>
