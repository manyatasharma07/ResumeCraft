<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funky Elegant Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #fdf2f8, #e0f2fe);
  font-family: 'Poppins', sans-serif;
}

.main {
  padding: 30px;
}

/* Form */
.form-box {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

/* Resume */
.resume-box {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  min-height: 1100px;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 20px 25px;
  background: linear-gradient(to right, #668ed7, #40d2e9, #7b8edc);
  color: white;
}

.profile-img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid white;
  object-fit: cover;
  margin-bottom: 12px;
}

.header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin-bottom: 5px;
}

.header p {
  font-size: 14px;
  opacity: 0.9;
}

/* Elegant divider */
.divider {
  width: 70px;
  height: 2px;
  background: white;
  margin: 12px auto 0;
  opacity: 0.8;
}

/* Content */
.content {
  padding: 30px;
}

/* Sections */
.section {
  margin-bottom: 25px;
  padding-bottom: 10px;
  border-bottom: 1px solid #eee;
}

.section h5 {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  margin-bottom: 10px;
  color: #111827;
}

/* List */
.section ul {
  padding-left: 18px;
}

.section li {
  font-size: 14px;
  margin-bottom: 6px;
  color: #374151;
}

/* Accent dots */
.section li::marker {
  color: #ec4899;
}

/* Button */
.btn-download {
  margin-top: 15px;
  background: linear-gradient(to right, #1c4faf, #6b7bda);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 25px;
}

/* Print */
@media print {
  .form-box, .btn-download {
    display: none;
  }
  body {
    background: white;
  }
}
</style>
</head>

<body>

<div class="container main">
<div class="row g-4">

<!-- FORM -->
<div class="col-md-5">
<div class="form-box">

<h4>Enter Details</h4>

<input class="form-control mb-2" placeholder="Full Name" oninput="update()">
<input class="form-control mb-2" placeholder="Email" oninput="update()">
<input class="form-control mb-2" placeholder="Phone" oninput="update()">

<input type="file" class="form-control mb-2" onchange="loadImage(event)">

<textarea class="form-control mb-2" placeholder="Objective" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Skills" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Education" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Experience" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Projects" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Achievements" oninput="update()"></textarea>

<button class="btn-download" onclick="window.print()">Download</button>

</div>
</div>

<!-- RESUME -->
<div class="col-md-7">
<div class="resume-box">

<!-- HEADER -->
<div class="header">
  <img id="profilePic" class="profile-img" src="https://via.placeholder.com/150">
  <h2 id="name">Your Name</h2>
  <p id="contact">email@example.com | 1234567890</p>
  <div class="divider"></div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="section">
<h5>Objective</h5>
<ul id="objective"></ul>
</div>

<div class="section">
<h5>Skills</h5>
<ul id="skills"></ul>
</div>

<div class="section">
<h5>Education</h5>
<ul id="education"></ul>
</div>

<div class="section">
<h5>Experience</h5>
<ul id="experience"></ul>
</div>

<div class="section">
<h5>Projects</h5>
<ul id="projects"></ul>
</div>

<div class="section">
<h5>Achievements</h5>
<ul id="achievements"></ul>
</div>

</div>

</div>
</div>

</div>
</div>

<script>
function makeList(id, text) {
  let el = document.getElementById(id);
  el.innerHTML = "";
  text.split("\n").forEach(t => {
    if(t.trim()){
      let li = document.createElement("li");
      li.textContent = t;
      el.appendChild(li);
    }
  });
}

function update() {
  let i = document.querySelectorAll("input, textarea");

  document.getElementById("name").innerText = i[0].value;
  document.getElementById("contact").innerText = i[1].value + " | " + i[2].value;

  makeList("objective", i[4].value);
  makeList("skills", i[5].value);
  makeList("education", i[6].value);
  makeList("experience", i[7].value);
  makeList("projects", i[8].value);
  makeList("achievements", i[9].value);
}

function loadImage(event) {
  document.getElementById("profilePic").src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
