<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Balanced Classic Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  background: #f4f6f9;
  font-family: 'Poppins', sans-serif;
}

.main {
  padding: 30px;
}

/* Form */
.form-box {
  background: white;
  padding: 20px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* Resume */
.resume-box {
  background: white;
  padding: 40px;
  border: 1px solid #d1d5db;
  border-top: 6px solid #3b82f6; /* subtle color */
  min-height: 1100px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 25px;
}

.header h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 5px;
}

.header p {
  color: #6b7280;
  font-size: 14px;
}

/* Section */
.section {
  margin-bottom: 20px;
}

.section h5 {
  font-size: 14px;
  text-transform: uppercase;
  border-bottom: 2px solid #e5e7eb;
  padding-bottom: 5px;
  margin-bottom: 10px;
  color: #111827;
}

/* List */
.section ul {
  padding-left: 18px;
}

.section li {
  font-size: 14px;
  margin-bottom: 6px;
  color: #374151;
}

/* Button */
.btn-download {
  margin-top: 15px;
  background: #3b82f6;
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 5px;
}

/* Print */
@media print {
  .form-box, .btn-download {
    display: none;
  }
  body {
    background: white;
  }
  .resume-box {
    border: none;
  }
}
</style>
</head>

<body>

<div class="container main">
<div class="row g-4">

<!-- FORM -->
<div class="col-md-5">
<div class="form-box">

<h4>Enter Details</h4>

<input class="form-control mb-2" placeholder="Full Name" oninput="update()">
<input class="form-control mb-2" placeholder="Email" oninput="update()">
<input class="form-control mb-2" placeholder="Phone" oninput="update()">

<textarea class="form-control mb-2" placeholder="Objective (2-3 lines)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Skills (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Education (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Experience (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Projects (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Internships (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Certifications (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Achievements (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Languages (one per line)" oninput="update()"></textarea>

<button class="btn-download" onclick="window.print()">Download</button>

</div>
</div>

<!-- RESUME -->
<div class="col-md-7">
<div class="resume-box">

<!-- Header -->
<div class="header">
  <h2 id="name">Your Name</h2>
  <p id="contact">email@example.com | 1234567890</p>
</div>

<!-- Sections -->

<div class="section">
<h5>Objective</h5>
<ul id="objective"></ul>
</div>

<div class="section">
<h5>Skills</h5>
<ul id="skills"></ul>
</div>

<div class="section">
<h5>Education</h5>
<ul id="education"></ul>
</div>

<div class="section">
<h5>Experience</h5>
<ul id="experience"></ul>
</div>

<div class="section">
<h5>Projects</h5>
<ul id="projects"></ul>
</div>

<div class="section">
<h5>Internships</h5>
<ul id="internships"></ul>
</div>

<div class="section">
<h5>Certifications</h5>
<ul id="certifications"></ul>
</div>

<div class="section">
<h5>Achievements</h5>
<ul id="achievements"></ul>
</div>

<div class="section">
<h5>Languages</h5>
<ul id="languages"></ul>
</div>

</div>
</div>

</div>
</div>

<script>
function makeList(id, text) {
  let el = document.getElementById(id);
  el.innerHTML = "";
  text.split("\n").forEach(t => {
    if(t.trim()){
      let li = document.createElement("li");
      li.textContent = t;
      el.appendChild(li);
    }
  });
}

function update() {
  let i = document.querySelectorAll("input, textarea");

  document.getElementById("name").innerText = i[0].value;
  document.getElementById("contact").innerText = i[1].value + " | " + i[2].value;

  makeList("objective", i[3].value);
  makeList("skills", i[4].value);
  makeList("education", i[5].value);
  makeList("experience", i[6].value);
  makeList("projects", i[7].value);
  makeList("internships", i[8].value);
  makeList("certifications", i[9].value);
  makeList("achievements", i[10].value);
  makeList("languages", i[11].value);
}
</script>

</body>
</html>
