<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder - ResumeCraft</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #eef2f7;
    }

    .main {
      padding: 30px;
    }

    /* Form */
    .form-box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    /* Resume */
    .resume-box {
      display: flex;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    /* Sidebar */
    .sidebar {
      width: 35%;
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 1.5rem;
    }

    .main-content {
      width: 65%;
      padding: 20px;
    }

    .section-title {
      font-weight: 600;
      margin-top: 15px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    .btn-download {
      margin-top: 15px;
      background: #2c3e50;
      color: white;
      border-radius: 25px;
      padding: 8px 20px;
      border: none;
    }
    @media print {
  body {
    background: white;
  }

  .form-box {
    display: none;
  }

.resume-box {
  width: 100%;              /* take full column width */
  min-height: 600px;        /* increase height */
  display: flex;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.form-box, .resume-box {
  height: 100%;
}
}
  </style>
</head>

<body>

<div class="container main">
<div class="row g-4 align-items-stretch">

    <!-- FORM -->
    <div class="col-md-5">
      <div class="form-box">
        <h4>Enter Details</h4>

        <input type="text" class="form-control mb-2" placeholder="Full Name" oninput="updateResume()">
        <input type="text" class="form-control mb-2" placeholder="Email" oninput="updateResume()">
        <input type="text" class="form-control mb-2" placeholder="Phone" oninput="updateResume()">

        <textarea class="form-control mb-2" placeholder="Skills" oninput="updateResume()"></textarea>
        <textarea class="form-control mb-2" placeholder="Education" oninput="updateResume()"></textarea>
        <textarea class="form-control mb-2" placeholder="Experience" oninput="updateResume()"></textarea>

        <textarea class="form-control mb-2" placeholder="Profile / Summary" oninput="updateResume()"></textarea>
<textarea class="form-control mb-2" placeholder="Projects" oninput="updateResume()"></textarea>
<textarea class="form-control mb-2" placeholder="Achievements / Certifications" oninput="updateResume()"></textarea>

        <button class="btn-download" onclick="download()">Download</button>
      </div>
    </div>

    <!-- RESUME -->
  <div class="col-md-7">
     <div class="resume-box" id="resume">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2 id="name">Your Name</h2>
    <p id="contact">Email | Phone</p>

    <div class="section-title">Skills</div>
    <p id="skills">Your skills</p>

    <div class="section-title">Achievements</div>
    <p id="achievements">Your achievements</p>
  </div>

  <!-- Main -->
  <div class="main-content">

    <div class="section-title">Profile</div>
    <p id="profile">Short profile summary</p>

    <div class="section-title">Education</div>
    <p id="education">Your education</p>

    <div class="section-title">Experience</div>
    <p id="experience">Your experience</p>

    <div class="section-title">Projects</div>
    <p id="projects">Your projects</p>

  </div>

</div>

  </div>
</div>
<script>

function updateResume() {
  let inputs = document.querySelectorAll("input, textarea");

  document.getElementById("name").innerText = inputs[0].value || "Your Name";
  document.getElementById("contact").innerText =
    (inputs[1].value || "Email") + " | " + (inputs[2].value || "Phone");

  document.getElementById("skills").innerText = inputs[3].value || "Your skills";
  document.getElementById("education").innerText = inputs[4].value || "Your education";
  document.getElementById("experience").innerText = inputs[5].value || "Your experience";

  document.getElementById("profile").innerText = inputs[6].value || "Short profile summary";
  document.getElementById("projects").innerText = inputs[7].value || "Your projects";
  document.getElementById("achievements").innerText = inputs[8].value || "Your achievements";
}
</script>

</body>
</html>
