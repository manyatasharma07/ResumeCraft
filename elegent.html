<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  background: #f3f4f6;
  font-family: 'Poppins', sans-serif;
}

.main {
  padding: 30px;
}

.form-box {
  background: white;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.resume-box {
  display: flex;
  background: white;
  min-height: 1000px;
  border: 1px solid #ccc;
}

/* Sidebar */
.sidebar {
  width: 30%;
  background: #1f2937;
  color: white;
  padding: 30px 20px;
}

/* Profile Image */
.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin: auto;
  display: block;
  border: 3px solid #fff;
}

/* Sidebar Sections */
.sidebar .section {
  margin-top: 20px;
}

.sidebar h5 {
  font-size: 12px;
  text-transform: uppercase;
  border-bottom: 1px solid #374151;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

.sidebar ul {
  padding-left: 18px;
}

.sidebar li {
  font-size: 13px;
  margin-bottom: 5px;
}

/* Content */
.content {
  width: 70%;
  padding: 35px;
}

/* Header (Name + Contact) */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header-text h2 {
  font-family: 'Playfair Display', serif;
  margin: 0;
}

.header-text p {
  margin: 0;
  font-size: 14px;
  color: #6b7280;
}

/* Sections */
.section {
  margin-bottom: 22px;
}

.section h5 {
  font-size: 14px;
  text-transform: uppercase;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

.section ul {
  padding-left: 18px;
}

.section li {
  font-size: 14px;
  margin-bottom: 6px;
  color: #374151;
}

/* Button */
.btn-download {
  margin-top: 15px;
  background: #111827;
  color: white;
  border: none;
  padding: 8px 18px;
}

/* Print */
@media print {
  .form-box, .btn-download {
    display: none;
  }
  body {
    background: white;
  }
  .resume-box {
    border: none;
  }
}
</style>
</head>

<body>

<div class="container main">
<div class="row g-4">

<!-- FORM -->
<div class="col-md-5">
<div class="form-box">

<h4>Enter Details</h4>

<input class="form-control mb-2" placeholder="Full Name" oninput="update()">
<input class="form-control mb-2" placeholder="Email" oninput="update()">
<input class="form-control mb-2" placeholder="Phone" oninput="update()">

<input type="file" class="form-control mb-2" accept="image/*" onchange="loadImage(event)">

<textarea class="form-control mb-2" placeholder="Objective" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Skills (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Education (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Experience (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Projects (one per line)" oninput="update()"></textarea>
<textarea class="form-control mb-2" placeholder="Achievements (one per line)" oninput="update()"></textarea>

<button class="btn-download" onclick="window.print()">Download</button>

</div>
</div>

<!-- RESUME -->
<div class="col-md-7">
<div class="resume-box">

<!-- Sidebar -->
<div class="sidebar">

<img id="profilePic" class="profile-img" src="https://via.placeholder.com/150">

<div class="section">
<h5>Skills</h5>
<ul id="skillsList"></ul>
</div>

<div class="section">
<h5>Achievements</h5>
<ul id="achievementsList"></ul>
</div>

</div>

<!-- Content -->
<div class="content">

<div class="header">
  <div class="header-text">
    <h2 id="name">Your Name</h2>
    <p id="contact">email@example.com | 1234567890</p>
  </div>
</div>

<div class="section">
<h5>Objective</h5>
<ul id="objectiveList"></ul>
</div>

<div class="section">
<h5>Education</h5>
<ul id="educationList"></ul>
</div>

<div class="section">
<h5>Experience</h5>
<ul id="experienceList"></ul>
</div>

<div class="section">
<h5>Projects</h5>
<ul id="projectsList"></ul>
</div>

</div>

</div>
</div>

</div>
</div>

<script>
function makeList(id, text) {
  let list = document.getElementById(id);
  list.innerHTML = "";
  text.split("\n").forEach(item => {
    if(item.trim() !== "") {
      let li = document.createElement("li");
      li.textContent = item;
      list.appendChild(li);
    }
  });
}

function update() {
  let i = document.querySelectorAll("input, textarea");

  document.getElementById("name").innerText = i[0].value;
  document.getElementById("contact").innerText = i[1].value + " | " + i[2].value;

  makeList("objectiveList", i[4].value);
  makeList("skillsList", i[5].value);
  makeList("educationList", i[6].value);
  makeList("experienceList", i[7].value);
  makeList("projectsList", i[8].value);
  makeList("achievementsList", i[9].value);
}

/* Image Upload */
function loadImage(event) {
  const image = document.getElementById("profilePic");
  image.src = URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
